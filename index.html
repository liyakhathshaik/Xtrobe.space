<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XTROBE — Coming Soon</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
        height: 100vh;
        overflow: hidden;
        background: radial-gradient(circle at bottom, #020111 0%, #000000 80%);
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
    }

    /* Starfield */
    .stars {
        position: fixed;
        width: 100%;
        height: 100%;
        background: transparent;
        overflow: hidden;
        z-index: -2;
    }

    .star {
        position: absolute;
        width: 2px;
        height: 2px;
        background: white;
        opacity: 0.8;
        animation: twinkle 2s infinite alternate;
    }

    @keyframes twinkle {
        from { opacity: 0.2; transform: scale(1); }
        to { opacity: 1; transform: scale(1.5); }
    }

    /* Floating particles */
    .particles span {
        position: absolute;
        display: block;
        width: 4px;
        height: 4px;
        background: #00eaff;
        animation: float 10s linear infinite;
        opacity: 0.6;
        border-radius: 50%;
    }

    @keyframes float {
        from {
            transform: translateY(100vh) scale(0.5);
        }
        to {
            transform: translateY(-10vh) scale(1);
        }
    }

    /* Content */
    .container {
        z-index: 2;
    }

    h1 {
        font-size: 4rem;
        letter-spacing: 6px;
        background: linear-gradient(90deg, #00eaff, #8a2eff, #00eaff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: glow 3s infinite alternate;
    }

    @keyframes glow {
        from { text-shadow: 0 0 10px rgba(0,234,255,0.4); }
        to { text-shadow: 0 0 25px rgba(138,46,255,0.9); }
    }

    .tagline {
        margin-top: 15px;
        font-size: 1.2rem;
        opacity: 0.8;
        letter-spacing: 2px;
    }

    .coming {
        margin-top: 25px;
        font-size: 1rem;
        opacity: 0.6;
        animation: pulse 2s infinite;
    }

    @keyframes pulse {
        0%,100% { opacity: 0.3; }
        50% { opacity: 1; }
    }

</style>
</head>
<body>

<div class="stars" id="stars"></div>
<div class="particles" id="particles"></div>

<div class="container">
    <h1>XTROBE</h1>
    <div class="tagline">Exploring Beyond Boundaries</div>
    <div class="coming">COMING SOON</div>
</div>

<script>
    // Generate stars
    const starsContainer = document.getElementById("stars");
    for (let i = 0; i < 120; i++) {
        let star = document.createElement("div");
        star.className = "star";
        star.style.top = Math.random() * window.innerHeight + "px";
        star.style.left = Math.random() * window.innerWidth + "px";
        star.style.animationDuration = 1 + Math.random() * 2 + "s";
        starsContainer.appendChild(star);
    }

    // Floating particles
    const particles = document.getElementById("particles");
    for (let i = 0; i < 25; i++) {
        let p = document.createElement("span");
        p.style.left = Math.random() * 100 + "vw";
        p.style.animationDuration = 6 + Math.random() * 8 + "s";
        p.style.animationDelay = Math.random() * 5 + "s";
        particles.appendChild(p);
    }
</script>

</body>
</html>
